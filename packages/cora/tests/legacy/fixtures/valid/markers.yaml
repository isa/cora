version: 1

diagram:
  kind: box-arrows
  direction: LR
  nodes:
    - id: intake
      label: Intake
      component: box
    - id: review
      label: Review
      component: box
    - id: queue
      label: Queue
      component: box
    - id: archive
      label: Archive
      component: box
    - id: alert
      label: Alert
      component: box
  edges:
    - from: intake
      to: review
      label: submit
      startMarker: circle
      endMarker: arrow
    - from: review
      to: queue
      label: accepted
      startMarker: filledCircle
      endMarker: arrow
    - from: review
      to: archive
      label: rejected
      startMarker: diamond
      endMarker: filledCircle
    - from: queue
      to: archive
      label: store
      endMarker: circle
    - from: archive
      to: alert
      label: retention event
      startMarker: square
      endMarker: filledSquare
