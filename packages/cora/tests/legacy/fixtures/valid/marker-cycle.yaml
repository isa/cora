version: 1

diagram:
  kind: flowchart
  nodes:
    - id: draft
      label: Draft
      component: box
    - id: validate
      label: Validate
      component: box
    - id: publish
      label: Publish
      component: box
    - id: revise
      label: Revise
      component: box
    - id: archive
      label: Release Notes
      component: box
  edges:
    - from: draft
      to: validate
      startMarker: filledCircle
      endMarker: arrow
    - from: validate
      to: publish
      label: pass
      endMarker: filledCircle
    - from: validate
      to: revise
      label: fail
      startMarker: circle
      endMarker: diamond
    - from: revise
      to: draft
      label: retry
      startMarker: circle
      endMarker: circle
    - from: publish
      to: archive
      label: record
      startMarker: filledSquare
      endMarker: square
