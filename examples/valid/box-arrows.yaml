version: 1

diagram:
  kind: box-arrows
  direction: LR
  nodes:
    - id: client
      label: Client
      component: document
    - id: proxy
      label: Edge Proxy
    - id: server
      label: Server
      component: app
  edges:
    - from: client
      to: proxy
      label: request
    - from: proxy
      to: server
      label: forward
    - from: server
      to: client
      label: response
