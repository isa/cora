version: 1

diagram:
  kind: box-arrows
  direction: LR
  nodes:
    - id: client
      label: Client
      shape: rounded
    - id: proxy
      label: Edge Proxy
      shape: rectangle
    - id: server
      label: Server
      shape: rectangle
  edges:
    - from: client
      to: proxy
      label: request
    - from: proxy
      to: server
      label: forward
    - from: server
      to: client
      label: response
