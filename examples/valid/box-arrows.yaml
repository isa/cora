version: 1

diagram:
  kind: box-arrows
  direction: LR
  nodes:
    - id: client
      label: Browser Client
      component: box
    - id: proxy
      label: Edge Proxy
      component: box
    - id: server
      label: API Server
      component: box
    - id: worker
      label: Async Worker
      component: box
    - id: audit
      label: Audit Log
      component: box
  edges:
    - from: client
      to: proxy
      label: request
    - from: proxy
      to: server
      label: forward
      endMarker: filledCircle
    - from: server
      to: worker
      label: enqueue
      startMarker: circle
      endMarker: square
    - from: worker
      to: audit
      label: write
      endMarker: diamond
    - from: server
      to: client
      label: response
      startMarker: filledSquare
