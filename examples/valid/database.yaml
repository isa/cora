version: 1

diagram:
  kind: database
  nodes:
    - id: app
      label: Application
      component: app
    - id: cache
      label: Redis
    - id: primary
      label: PostgreSQL Primary
    - id: replica
      label: PostgreSQL Replica
  edges:
    - from: app
      to: cache
      label: session lookup
    - from: app
      to: primary
      label: writes
    - from: app
      to: replica
      label: reads
    - from: primary
      to: replica
      label: streaming
