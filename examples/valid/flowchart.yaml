version: 1

diagram:
  kind: flowchart
  nodes:
    - id: start
      label: Start
      shape: rounded
    - id: check
      label: Valid?
      shape: diamond
    - id: end
      label: Done
      shape: rounded
  edges:
    - from: start
      to: check
    - from: check
      to: end
      label: yes
