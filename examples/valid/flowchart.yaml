version: 1

diagram:
  kind: flowchart
  nodes:
    - id: start
      label: Start
    - id: load
      label: Load Input
    - id: check
      label: Valid?
    - id: process
      label: Process
    - id: reject
      label: Reject
    - id: end
      label: Done
  edges:
    - from: start
      to: load
    - from: load
      to: check
    - from: check
      to: process
      label: yes
    - from: check
      to: reject
      label: no
    - from: process
      to: end
    - from: reject
      to: load
      label: retry
