version: 1

diagram:
  kind: microservice
  layout: auto
  direction: TB
  nodes:
    # Customer experience domain
    - id: gateway
      label: API Gateway
      component: box
    - id: web-bff
      label: Web BFF
      component: box
    - id: mobile-bff
      label: Mobile BFF
      component: box
    - id: auth
      label: Auth Service
      component: box
    - id: users
      label: Users Service
      component: box
    - id: catalog
      label: Catalog Service
      component: box
    - id: search
      label: Search Service
      component: box
    - id: cart
      label: Cart Service
      component: box
    - id: checkout
      label: Checkout Service
      component: box
    - id: notifications
      label: Notification Service
      component: box

    # Commerce platform domain
    - id: orders
      label: Orders Service
      component: box
    - id: payments
      label: Payments Service
      component: box
    - id: inventory
      label: Inventory Service
      component: box
    - id: pricing
      label: Pricing Service
      component: box
    - id: fulfillment
      label: Fulfillment Service
      component: box
    - id: analytics
      label: Analytics Service
      component: box
    - id: recommendations
      label: Recommendations Service
      component: box
    - id: event-bus
      label: Event Bus
      component: box
    - id: config
      label: Config Service
      component: box
    - id: audit
      label: Audit Service
      component: box

  edges:
    # Customer domain — ingress and internal flows
    - from: gateway
      to: web-bff
    - from: gateway
      to: mobile-bff
    - from: web-bff
      to: auth
    - from: mobile-bff
      to: auth
    - from: web-bff
      to: catalog
    - from: mobile-bff
      to: catalog
    - from: auth
      to: users
    - from: catalog
      to: search
    - from: web-bff
      to: cart
    - from: cart
      to: checkout

    # Platform domain — internal orchestration
    - from: orders
      to: payments
    - from: orders
      to: inventory
    - from: orders
      to: fulfillment
    - from: inventory
      to: pricing
    - from: fulfillment
      to: analytics
    - from: recommendations
      to: analytics
    - from: event-bus
      to: analytics
    - from: config
      to: orders
    - from: config
      to: payments

    # Cross-domain — customer half talks to platform half
    - from: checkout
      to: orders
      label: place order
      endMarker: filledCircle
    - from: checkout
      to: payments
      label: authorize
      endMarker: diamond
    - from: cart
      to: inventory
      label: reserve stock
      endMarker: square
    - from: catalog
      to: pricing
      label: live prices
    - from: search
      to: recommendations
      label: personalize
    - from: auth
      to: audit
      label: login events
    - from: users
      to: recommendations
      label: preferences

    # Cross-domain — platform half talks back to customer half
    - from: orders
      to: notifications
      label: order updates
    - from: payments
      to: notifications
      label: receipts
    - from: inventory
      to: cart
      label: stock sync
    - from: recommendations
      to: catalog
      label: featured items
    - from: event-bus
      to: notifications
      label: async alerts
      startMarker: filledCircle
    - from: fulfillment
      to: notifications
      label: shipping updates

  groups:
    - id: customer-experience
      label: Customer Experience
      contains:
        - gateway
        - web-bff
        - mobile-bff
        - auth
        - users
        - catalog
        - search
        - cart
        - checkout
        - notifications
    - id: commerce-platform
      label: Commerce Platform
      contains:
        - orders
        - payments
        - inventory
        - pricing
        - fulfillment
        - analytics
        - recommendations
        - event-bus
        - config
        - audit
